<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Master</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <h1>🧠 Quiz Master Challenge</h1>
        <hr>
        <div id="question-box">
            <p id="question">Loading question...</p>
            <div class="options">
                <button class="btn" onclick="checkAnswer(this)">Option 1</button>
                <button class="btn" onclick="checkAnswer(this)">Option 2</button>
                <button class="btn" onclick="checkAnswer(this)">Option 3</button>
            </div>
        </div>
        <div id="score-box" class="hidden">
            <h2>🎉 Quiz Completed!</h2>
            <p>Your total score is outstanding.</p>
        </div>
    </div>
    <script src="quize.js"></script>
</body>
</html>

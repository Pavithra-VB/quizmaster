<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Master Challenge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="quiz-container">
        
        <div id="start-screen" class="screen active">
            <h1 class="logo">🧠 Quiz Master</h1>
            <p class="subtitle">Select a category to test your knowledge</p>
            
            <div class="category-grid">
                <button class="cat-btn selected" data-cat="general">🌍 General</button>
                <button class="cat-btn" data-cat="science">🧪 Science</button>
                <button class="cat-btn" data-cat="tech">💻 Tech / DevOps</button>
                <button class="cat-btn" data-cat="history">📜 History</button>
            </div>
            
            <button id="start-btn" class="action-btn">Start Challenge 🚀</button>
        </div>

        <div id="quiz-screen" class="screen">
            <div class="quiz-header">
                <span id="q-label">Question 1 of 10</span>
                <div class="header-stats">
                    <span>Score: <strong id="live-score">0</strong></span>
                </div>
            </div>

            <div class="progress-bar">
                <div id="progress-fill" style="width: 0%;"></div>
            </div>

            <div class="question-body">
                <div class="timer-wrapper">
                    <svg class="timer-svg" viewBox="0 0 40 40">
                        <circle class="timer-bg" cx="20" cy="20" r="18"></circle>
                        <circle id="timer-circle" class="timer-progress" cx="20" cy="20" r="18" stroke-dasharray="113.1" stroke-dashoffset="0"></circle>
                    </svg>
                    <div id="timer-num">15</div>
                </div>
                <span id="q-tag">Q1</span>
                <p id="question-text">Loading question...</p>
            </div>

            <div id="options-list" class="options">
                </div>
        </div>

        <div id="result-screen" class="screen">
            <div id="result-icon">🏆</div>
            <h2 id="result-heading">Perfect Score!</h2>
            <p id="result-sub">You got every question right!</p>

            <div class="score-display">
                <span id="score-num">0</span> / 10
            </div>

            <table class="stats-table">
                <tr><td>✅ Correct Answers:</td><td id="stat-c">0</td></tr>
                <tr><td>❌ Wrong Answers:</td><td id="stat-w">0</td></tr>
                <tr><td>📊 Accuracy Rate:</td><td id="stat-a">0%</td></tr>
            </table>

            <div class="result-actions">
                <button id="retry-btn" class="action-btn">Try Again 🔄</button>
                <button id="home-btn" class="action-btn secondary-btn">Main Menu 🏠</button>
            </div>
        </div>

    </div>

    <script src="quiz.js"></script>
</body>
</html>
